    <script>
        async function checkStatus() {
            const id = document.getElementById('id_num').value.trim();
            const ph = document.getElementById('phone').value.trim();
            const resDiv = document.getElementById('result');
            
            // Layer 1: Smart Frontend Validation
            if(id.length !== 13) { 
                alert("❌ Please enter a valid 13-digit South African ID."); 
                return; 
            }
            if(ph.length < 9) { 
                alert("❌ Please enter a valid registered Phone Number."); 
                return; 
            }

            resDiv.style.display = 'block';
            resDiv.innerHTML = "Processing Security Check... ⏳";
            resDiv.className = "result-box";

            try {
                const response = await fetch(`/api/check?id_num=${id}&phone=${ph}`);
                const data = await response.json();
                
                // Layer 2: API Response Handling
                // Agar server "Not Found" ya error de
                if(data.error || data.detail === "Not Found" || (data.status && data.status.toUpperCase() === "FAILED")) {
                    resDiv.className = "result-box declined";
                    resDiv.innerHTML = `⚠️ <strong>INVALID DETAILS</strong><br><small>No record found. Please check your ID and Phone number.</small>`;
                } 
                // Agar sach me Approved ho
                else if(data.status && data.status.toUpperCase().includes("APPROVED")) {
                    resDiv.className = "result-box approved";
                    resDiv.innerHTML = `✅ <strong>APPROVED</strong><br><small>Payment Date: ${data.payout_date || 'Check SMS'}</small>`;
                } 
                // Real Pending status
                else {
                    resDiv.className = "result-box declined";
                    resDiv.innerHTML = `⏳ <strong>STATUS: ${data.status || 'PENDING'}</strong><br><small>${data.remark || 'Application is in process'}</small>`;
                }
            } catch (e) {
                resDiv.className = "result-box declined";
                resDiv.innerHTML = "System Busy. Please try again after 2 minutes.";
            }
        }
    </script>
