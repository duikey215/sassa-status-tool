<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASSA Status Check | Official Portal 2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .header { background: #007a33; color: white; padding: 20px; text-align: center; border-bottom: 6px solid #ffcc00; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 4px solid #00008b; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #007a33; color: white; padding: 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #005a26; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; text-align: center; }
        .approved { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .declined { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0; font-size:24px;">SASSA STATUS CHECK</h1>
        <p style="margin:5px 0 0;">SRD R350 Grant Verification</p>
    </div>
    <div class="container">
        <div class="card">
<input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="13" id="id_num" placeholder="Enter 13-digit ID Number" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
<input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="10" id="phone" placeholder="Enter Phone Number" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            <button onclick="checkStatus()">VERIFY STATUS</button>
            <div id="result" class="result-box"></div>
        </div>
    </div>
    <script>
async function checkStatus() {
            const id = document.getElementById('id_num').value.trim();
            const ph = document.getElementById('phone').value.trim();
            const resDiv = document.getElementById('result');
            
            // Frontend Security Check
            if(id.length !== 13) { alert("❌ Please enter a valid 13-digit ID."); return; }
            if(ph.length < 9) { alert("❌ Please enter a valid Phone Number."); return; }

            resDiv.style.display = 'block';
            resDiv.innerHTML = "Processing Secure Check... ⏳";
            resDiv.className = "result-box";

            try {
                const response = await fetch(`/api/check?id_num=${id}&phone=${ph}`);
                const data = await response.json();
                
                // 1. Agar API Error de, ya data empty ho, ya status "FAILED" ho
                if (data.error || data.status === "FAILED" || !data.status || data.status.trim() === "") {
                    resDiv.className = "result-box declined";
                    resDiv.innerHTML = `⚠️ <strong>APPLICATION NOT FOUND</strong><br><small>Please check your ID and Phone Number. No active grant found.</small>`;
                } 
                // 2. Agar Approved ho
                else if (data.status.toUpperCase().includes("APPROVED")) {
                    resDiv.className = "result-box approved";
                    resDiv.innerHTML = `✅ <strong>STATUS: APPROVED</strong><br><small>Payday: ${data.payout_date || 'Check SMS for date'}</small>`;
                } 
                // 3. Agar real mein Pending ho
                else if (data.status.toUpperCase().includes("PENDING")) {
                    resDiv.className = "result-box declined"; // Keeping red/yellow background for pending
                    resDiv.innerHTML = `⏳ <strong>STATUS: PENDING</strong><br><small>Your application is currently being processed by SASSA.</small>`;
                } 
                // 4. Any other official status (Declined, Canceled, Referred)
                else {
                    resDiv.className = "result-box declined";
                    resDiv.innerHTML = `❌ <strong>STATUS: ${data.status.toUpperCase()}</strong><br><small>${data.remark || 'Please check the official SASSA portal for more details.'}</small>`;
                }
            } catch (e) {
                resDiv.className = "result-box declined";
                resDiv.innerHTML = "System Busy. Please try again in 1 minute.";
            }
        }
    </script>
</body>
</html>
