<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASSA Status Check | Official Portal 2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .header { background: #007a33; color: white; padding: 20px; text-align: center; border-bottom: 6px solid #ffcc00; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 4px solid #00008b; }
        label { font-weight: bold; color: #333; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #007a33; color: white; padding: 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #005a26; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; text-align: center; font-size: 18px; }
        .approved { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .declined { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        .footer { text-align: center; font-size: 13px; color: #777; margin-top: 30px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="margin:0; font-size:24px;">SASSA STATUS CHECK</h1>
        <p style="margin:5px 0 0;">SRD R350 Grant Verification</p>
    </div>
    <div class="container">
        <div class="card">
            <label>South African ID Number</label>
            <input type="number" id="id_num" placeholder="e.g. 9201015000081">
            <label>Registered Mobile Number</label>
            <input type="number" id="phone" placeholder="e.g. 0812345678">
            <button onclick="checkStatus()">VERIFY STATUS</button>
            <div id="result" class="result-box"></div>
        </div>
        <div class="footer">
            <p><strong>Official Status Checker Helper</strong><br>
            Please note: We are not affiliated with SASSA. We help you check your status faster.</p>
        </div>
    </div>

    <script>
        async function checkStatus() {
            const id = document.getElementById('id_num').value;
            const ph = document.getElementById('phone').value;
            const resDiv = document.getElementById('result');
            
            if(!id || !ph) { alert("Please enter both ID and Phone"); return; }

            resDiv.style.display = 'block';
            resDiv.innerHTML = "Processing Security Check... ⏳";
            resDiv.className = "result-box";

            try {
                const response = await fetch(`/api/check?id_num=${id}&phone=${ph}`);
                const data = await response.json();
                
                if(data.status && data.status.toUpperCase().includes("APPROVED")) {
                    resDiv.className = "result-box approved";
                    resDiv.innerHTML = `✅ <strong>APPROVED</strong><br><small>Payment Date: ${data.payout_date || 'Coming Soon'}</small>`;
                } else {
                    resDiv.className = "result-box declined";
                    resDiv.innerHTML = `❌ <strong>STATUS: ${data.status || 'PENDING'}</strong><br><small>${data.remark || 'Verification in progress'}</small>`;
                }
            } catch (e) {
                resDiv.innerHTML = "System Busy. Please try again after 2 minutes.";
            }
        }
    </script>
</body>
</html>
