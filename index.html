<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASSA Status Check | Official Portal 2026</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .header { background: #007a33; color: white; padding: 20px; text-align: center; border-bottom: 6px solid #ffcc00; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 4px solid #00008b; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #007a33; color: white; padding: 16px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .result-box { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; text-align: center; }
        .approved { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .declined { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SASSA STATUS CHECK</h1>
        <p>SRD R350 Grant Verification</p>
    </div>
    <div class="container">
        <div class="card">
            <input type="number" id="id_num" placeholder="Enter ID Number">
            <input type="number" id="phone" placeholder="Enter Phone Number">
            <button onclick="checkStatus()">VERIFY STATUS</button>
            <div id="result" class="result-box"></div>
        </div>
    </div>
    <script>
        async function checkStatus() {
            const id = document.getElementById('id_num').value;
            const ph = document.getElementById('phone').value;
            const resDiv = document.getElementById('result');
            resDiv.style.display = 'block';
            resDiv.innerHTML = "Processing... ⏳";
            try {
                const response = await fetch(`/api/check?id_num=${id}&phone=${ph}`);
                const data = await response.json();
                if(data.status && data.status.toUpperCase().includes("APPROVED")) {
                    resDiv.className = "result-box approved";
                    resDiv.innerHTML = `✅ <strong>APPROVED</strong><br>Date: ${data.payout_date || 'Check SMS'}`;
                } else {
                    resDiv.className = "result-box declined";
                    resDiv.innerHTML = `❌ <strong>STATUS: ${data.status || 'PENDING'}</strong><br>${data.remark || 'Verification in progress'}`;
                }
            } catch (e) {
                resDiv.innerHTML = "Server Error. Try again.";
            }
        }
    </script>
</body>
</html>
